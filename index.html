<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Era uma vez...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background-color: #000;
      color: #fff;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .photo {
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(255,255,255,0.2);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      max-width: 500px;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .btn {
      background: #ff4d6d;
      color: white;
      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1e4d;
    }

    .fade-in {
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>

<body>
  <div class="container fade-in">

    <!-- FOTO -->
    <img src="foto.jpg" alt="Princesa" class="photo">

    <!-- TEXTO -->
    <h1>Era uma vez...</h1>

    <p>
      uma princesa linda, gentil e cheia de sonhos...<br><br>
      mas que não imaginava que estava prestes a viver
      a história mais especial de todas.
    </p>

    <!-- BOTÃO -->
    <a href="pagina2.html" class="btn">Descobrir o segredo 👀</a>

  </div>
</body>
</html>
