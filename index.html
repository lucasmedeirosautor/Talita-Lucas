<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Era uma vez...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body{
      margin: 0;
      font-family: 'Cinzel', serif;
      color: #f5e6c8;
      background: #000;
      text-align: center;
      overflow-x: hidden;
    }

    .container{
      padding: 30px;
    }

    .title{
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: gold;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(255,215,0,0.6);
    }

    .photo{
      width: 90%;
      max-width: 380px;
      border-radius: 20px;
      border: 2px solid gold;
      margin-bottom: 30px;
      box-shadow: 0 0 30px rgba(255,215,0,0.4);
    }

    .text-block{
      font-size: 18px;
      margin: 30px 0;
      min-height: 50px;
    }

    .button{
      background: linear-gradient(45deg, #d4af37, #ffd700);
      color: black;
      padding: 15px 25px;
      border-radius: 40px;
      text-decoration: none;
      display: inline-block;
      margin-top: 30px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,215,0,0.6);
      transition: 0.3s;
    }

    .button:hover{
      transform: scale(1.05);
    }

    .stars{
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent url('https://www.transparenttextures.com/patterns/stardust.png');
      animation: moveStars 60s linear infinite;
      z-index: -1;
    }

    @keyframes moveStars {
      from {background-position: 0 0;}
      to {background-position: 10000px 5000px;}
    }
  </style>
</head>

<body>

<div class="stars"></div>

<!-- Áudio -->
<audio id="music" loop>
  <source src="Musica.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <div class="title">Era uma vez...</div>

  <img src="IMG.PNG" class="photo">

  <!-- Botão para ativar música -->
  <button onclick="playMusic()" class="button">🔊 Ativar música</button>

  <div class="text-block" data-text="Em um reino muito distante, chamado Paulínia…"></div>

  <div class="text-block" data-text="morava uma princesa chamada Talita."></div>

  <div class="text-block" data-text="A princesa Talita era uma mulher maravilhosa, incrível, cheia de sonhos… fiel ao Senhor e de coração puro."></div>

  <div class="text-block" data-text="Mas essa princesa também era forte e guerreira, tendo enfrentado inúmeras batalhas… e mesmo assim, nunca deixou de acreditar no amor."></div>

  <div class="text-block" data-text="Ela acreditava que, um dia, encontraria o seu príncipe encantado… aquele que caminharia ao seu lado, e juntos teriam um Reino muito forte e abençoado por Deus."></div>

  <div class="text-block" data-text="E mal sabia ela… que sua história estava prestes a mudar."></div>

  <a href="https://lucasmedeirosautor.github.io/Surpresa-2/" class="button">Descobrir Como 👀</a>

</div>

<script>
  const blocks = document.querySelectorAll('.text-block');

  function typeEffect(element, text, speed = 40) {
    return new Promise(resolve => {
      let i = 0;

      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else {
          resolve();
        }
      }

      typing();
    });
  }

  async function startSequence() {
    for (let block of blocks) {
      const text = block.getAttribute('data-text');
      await typeEffect(block, text);
      await new Promise(r => setTimeout(r, 800));
    }
  }

  window.addEventListener('load', startSequence);

  // Música
  function playMusic(){
    const music = document.getElementById("music");
    music.play();
  }
</script>

</body>
</html>
